<div class="history-page" id="historyPage">
    <div class="hi-nav">
        <div class="hi-nav-title">
            <h1>Activity History</h1>
        </div>
        <div class="hi-nav-buttons">
            <div class="search-wrapper" id="hiSearchWrapper">
                <i class="ti ti-search"></i>
                <input type="text" id="hiSearchInput"
                    placeholder="Search activity logs...">
            </div>
            <button class="hi-filter-btn"><i
                    class="ti ti-adjustments-horizontal"></i></button>
            <button class="hi-refresh-btn"><i
                    class="ti ti-refresh"></i></button>
        </div>
    </div>
    <hr>

    <div class="history-list-container" id="historyListBody">
        <div class="history-item">
            <div class="hi-status-line"></div>
            <div class="hi-icon log-expense"><i class="ti ti-plus"></i></div>
            <div class="hi-content">
                <div class="hi-info">
                    <span class="hi-user">Admin</span>
                    <span class="hi-action">added a new expense:</span>
                    <span class="hi-target">"Hotel Rest"</span>
                </div>
                <div class="hi-meta">
                    <span class="hi-time">2 mins ago</span>
                    <span class="hi-amount">+$250.00</span>
                </div>
            </div>
        </div>

        <div class="history-item">
            <div class="hi-status-line"></div>
            <div class="hi-icon log-trip"><i
                    class="ti ti-circle-check"></i></div>
            <div class="hi-content">
                <div class="hi-info">
                    <span class="hi-user">System</span>
                    <span class="hi-action">approved the trip:</span>
                    <span class="hi-target">"Berlin Business Meeting"</span>
                </div>
                <div class="hi-meta">
                    <span class="hi-time">1 hour ago</span>
                    <span class="hi-tag">Confirmed</span>
                </div>
            </div>
        </div>

        <div class="history-item">
            <div class="hi-status-line"></div>
            <div class="hi-icon log-delete"><i class="ti ti-trash"></i></div>
            <div class="hi-content">
                <div class="hi-info">
                    <span class="hi-user">Admin</span>
                    <span class="hi-action">deleted a report:</span>
                    <span class="hi-target">"January_Draft_01"</span>
                </div>
                <div class="hi-meta">
                    <span class="hi-time">Yesterday</span>
                    <span class="hi-status-red">Deleted</span>
                </div>
            </div>
        </div>
    </div>
</div>
