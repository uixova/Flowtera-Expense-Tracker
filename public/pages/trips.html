<div class="trips" id="trips">
    <div class="trip-page" id="tripsPage">
        <div class="tr-nav">
            <div class="tr-nav-title">
                <h1>Trips & Travels</h1>
            </div>
            <div class="tr-nav-buttons">
                <div class="search-wrapper" id="trSearchWrapper">
                    <i class="ti ti-search"></i>
                    <input type="text" id="trSearchInput"
                        placeholder="Search trips...">
                </div>
                <button id="trCreateBtn">New Trip</button>
                <button class="tr-filter-btn" id="trFilterBtn"><i
                        class="ti ti-filter"></i></button>
                <button class="tr-ranking-btn" id="trRankingBtn"><i
                        class="ti ti-filter-2"></i></button>
                <button class="tr-setting-btn" id="trSettingBtn"><i
                        class="ti ti-dots"></i></button>
            </div>
        </div>
        <hr>

        <div class="trip-title-nav">
            <input type="checkbox" id="selectAllTrips">
            <span class="tr-title-span">Trip Details</span>
            <span class="tr-title-span">Category</span>
            <span class="tr-title-span">Destination</span>
            <span class="tr-title-span">Vehicle</span>
            <span class="tr-title-span">Est. Cost</span>
            <span class="tr-title-span">Duration</span>
            <span class="tr-title-span">Status</span>
        </div>

        <div class="trip-list-container" id="tripListBody">
            <div class="trip-block">
                <input type="checkbox" class="select-trip">
                <div class="trip-block-details">
                    <span class="trip-icon"><i
                            class="ti ti-plane-departure"></i></span>
                    <div class="trip-details-text">
                        <span class="trip-date">15/03/2026</span>
                        <span class="trip-title">Business
                            Meeting</span>
                    </div>
                </div>
                <span class="trip-category">Corporate</span>
                <span class="trip-destination">Berlin, DE</span>
                <span class="trip-vehicle">Flight</span>
                <span class="tr-amount">$1,200</span>
                <span class="trip-duration">3 Days</span>
                <span
                    class="trip-status status-confirmed">Confirmed</span>
            </div>

            <div class="trip-block">
                <input type="checkbox" class="select-trip">
                <div class="trip-block-details">
                    <span class="trip-icon"><i
                            class="ti ti-car"></i></span>
                    <div class="trip-details-text">
                        <span class="trip-date">20/03/2026</span>
                        <span class="trip-title">Family Visit</span>
                    </div>
                </div>
                <span class="trip-category">Personal</span>
                <span class="trip-destination">Izmir, TR</span>
                <span class="trip-vehicle">Car</span>
                <span class="tr-amount">$300</span>
                <span class="trip-duration">5 Days</span>
                <span class="trip-status status-onroad">On
                    Road</span>
            </div>
        </div>
    </div>
</div>
