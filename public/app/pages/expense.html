<div class="expense" id="expense">
    <div class="ex-nav">
        <div class="ex-nav-title">
            <h1>Expenses</h1>
        </div>
        <div class="ex-nav-buttons">
            <div class="ex-nav-buttons">
                <div class="search-wrapper" id="exSearchWrapper">
                    <i class="ti ti-search"></i>
                    <input type="text" id="exSearchInput"
                        placeholder="Search expenses...">
                </div>
                <button id="exCreateExpense">New Expense</button>
            </div>
            <button class="ex-filter-cta" id="exFilterBtn"
                onclick="toggleFilter('expense', this)"><i
                    class="ti ti-filter"></i></button>
            <button class="ex-ranking-cta" id="exRankingBtn"><i
                    class="ti ti-filter-2"></i></button>
            <button class="ex-setting-three-dot"
                id="exSettingBtn"><i class="ti ti-list-details"></i></button>
        </div>
    </div>
    <hr>
    <div class="expense-title-nav">
        <input type="checkbox" id="selectAllExpense">
        <span class="ex-title-span">Details</span>
        <span class="ex-title-span">Category</span>
        <span class="ex-title-span">Merchant</span>
        <span class="ex-title-span">Payment Method</span>
        <span class="ex-title-span">Amount</span>
        <span class="ex-title-span">Report</span>
        <span class="ex-title-span">Status</span>
    </div>
    <div class="expense-list-container" id="expenseListBody">
        <div class="expense-block" onclick="openExDetailModal({
    title: 'Rest',
    category: 'Accommodation',
    merchant: 'Hotel',
    amount: '$250',
    user: 'Ahmet Yılmaz', 
    desc: 'Hotel stay for February business trip.',
    image: 'images/receipt.jpg'
        })">
            <input type="checkbox" class="select-expense">
            <div class="expense-block-details">
                <span class="expense-icon"><i
                        class="ti ti-bed"></i></span>
                <div class="expense-details-text">
                    <span class="expense-date">09/02/2026</span>
                    <span class="expense-title">Rest</span>
                </div>
            </div>
            <span class="expense-category">Accommodation</span>
            <span class="expense-merchant">Hotel</span>
            <span class="expense-payment-method">Cash</span>
            <span class="ex-expense-amount">$250</span>
            <span class="expense-report">February_2022</span>
            <span class="expense-status">Submitted</span>
        </div>
    </div>

    <div class="ex-modal-overlay" id="newExpenseModal">
        <div class="ex-modal-card">
            <div class="ex-modal-header">
                <div class="ex-modal-title">
                    <i class="ti ti-receipt-tax"></i>
                    <span>Add New Expense</span>
                </div>
                <button class="ex-modal-close"
                    onclick="toggleNewExpenseModal()"><i
                        class="ti ti-x"></i></button>
            </div>

            <div class="ex-modal-body">
                <div class="ex-modal-info-bar">
                    <div class="info-item">
                        <i class="ti ti-calendar-event"></i>
                        <span id="exAutoDate">--/--/----</span>
                    </div>
                    <div class="info-item">
                        <i class="ti ti-shield-check"></i>
                        <span id="exAutoStatus">Status: Pending</span>
                    </div>
                </div>

                <form id="newExpenseForm" onsubmit="event.preventDefault()">
                    <div class="ex-input-group full">
                        <label for="exInpTitle">Detail / Title</label>
                        <input type="text" id="exInpTitle"
                            placeholder="e.g. Office Supplies" required>
                    </div>

                    <div class="ex-input-row">
                        <div class="ex-input-group">
                            <label for="exInpCategory">Category</label>
                            <select id="exInpCategory">
                                <option value="Food">Food & Drink</option>
                                <option value="Transport">Transport</option>
                                <option
                                    value="Accommodation">Accommodation</option>
                                <option value="Health">Health</option>
                                <option
                                    value="Entertainment">Entertainment</option>
                            </select>
                        </div>
                        <div class="ex-input-group">
                            <label for="exInpAmount">Amount ($)</label>
                            <input type="number" id="exInpAmount"
                                placeholder="0.00" step="0.01" required>
                        </div>
                    </div>

                    <div class="ex-input-row">
                        <div class="ex-input-group">
                            <label for="exInpMerchant">Merchant</label>
                            <input type="text" id="exInpMerchant"
                                placeholder="e.g. Amazon, Starbucks">
                        </div>
                        <div class="ex-input-group">
                            <label for="exInpMethod">Payment Method</label>
                            <select id="exInpMethod">
                                <option value="Cash">Cash</option>
                                <option value="Credit Card">Credit Card</option>
                                <option value="Bank Transfer">Bank
                                    Transfer</option>
                            </select>
                        </div>
                    </div>

                    <div class="ex-input-group full">
                        <label>Receipt / Document</label>
                        <div class="ex-simple-upload" id="uploadWrapper"
                            onclick="document.getElementById('exInpReceipt').click()">
                            <div id="beforeSelect" class="upload-placeholder">
                                <i class="ti ti-file-upload"></i>
                                <span>Select receipt (Image or PDF)</span>
                            </div>

                            <div id="afterSelect" class="upload-preview"
                                style="display: none;">
                                <div id="previewIcon"
                                    class="preview-icon"></div> <div
                                    class="preview-details">
                                    <span
                                        id="previewFileName">filename.jpg</span>
                                    <button type="button"
                                        class="remove-file-btn"
                                        onclick="removeSelectedFile(event)">Remove</button>
                                </div>
                            </div>

                            <input type="file" id="exInpReceipt" hidden
                                accept=".pdf, .jpg, .jpeg, .png"
                                onchange="handleFilePreview(this)">
                        </div>
                    </div>

                    <div class="ex-modal-options">
                        <div class="report-toggle-wrapper">
                            <span>Add to Monthly Report?</span>
                            <label class="switch">
                                <input type="checkbox" id="exInpReport" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </form>
            </div>

            <div class="ex-modal-footer">
                <button class="ex-modal-btn cancel"
                    onclick="toggleNewExpenseModal()">Cancel</button>
                <button class="ex-modal-btn save" id="exSaveBtn">Create
                    Expense</button>
            </div>
        </div>
    </div>
</div>
