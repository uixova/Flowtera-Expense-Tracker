<div class="trips" id="trips">
    <div class="trip-page" id="tripsPage">
        <div class="tr-nav">
            <div class="tr-nav-title">
                <h1>Trips & Travels</h1>
            </div>
            <div class="tr-nav-buttons">
                <div class="search-wrapper" id="trSearchWrapper">
                    <i class="ti ti-search"></i>
                    <input type="text" id="trSearchInput"
                        placeholder="Search trips...">
                </div>
                <button id="trCreateTrip"
                    onclick="window.toggleNewTripModal()">New Trip</button>
                <button class="tr-filter-btn" id="trFilterBtn"
                    onclick="toggleFilter('trips', this)"><i
                        class="ti ti-filter"></i></button>
                <button class="tr-ranking-btn" id="trRankingBtn"><i
                        class="ti ti-filter-2"></i></button>
                <button class="tr-setting-btn" id="trSettingBtn"><i
                        class="ti ti-list-details"></i></button>
            </div>
        </div>
        <hr>

        <div class="trip-title-nav">
            <input type="checkbox" id="selectAllTrips">
            <span class="tr-title-span">Trip Details</span>
            <span class="tr-title-span">Category</span>
            <span class="tr-title-span">Destination</span>
            <span class="tr-title-span">Vehicle</span>
            <span class="tr-title-span">Est. Cost</span>
            <span class="tr-title-span">Duration</span>
            <span class="tr-title-span">Status</span>
        </div>

        <div class="trip-list-container" id="tripListBody">
            <div class="trip-block">
                <input type="checkbox" class="select-trip">
                <div class="trip-block-details">
                    <span class="trip-icon"><i
                            class="ti ti-plane-departure"></i></span>
                    <div class="trip-details-text">
                        <span class="trip-date">15/03/2026</span>
                        <span class="trip-title">Business
                            Meeting</span>
                    </div>
                </div>
                <span class="trip-category">Corporate</span>
                <span class="trip-destination">Berlin, DE</span>
                <span class="trip-vehicle">Flight</span>
                <span class="tr-amount">$1,200</span>
                <span class="trip-duration">3 Days</span>
                <span
                    class="trip-status status-confirmed">Confirmed</span>
            </div>

            <div class="trip-block">
                <input type="checkbox" class="select-trip">
                <div class="trip-block-details">
                    <span class="trip-icon"><i
                            class="ti ti-car"></i></span>
                    <div class="trip-details-text">
                        <span class="trip-date">20/03/2026</span>
                        <span class="trip-title">Family Visit</span>
                    </div>
                </div>
                <span class="trip-category">Personal</span>
                <span class="trip-destination">Izmir, TR</span>
                <span class="trip-vehicle">Car</span>
                <span class="tr-amount">$300</span>
                <span class="trip-duration">5 Days</span>
                <span class="trip-status status-onroad">On
                    Road</span>
            </div>
        </div>
    </div>

    <div class="tr-modal-overlay" id="newTripModal">
        <div class="tr-modal-card">
            <div class="tr-modal-header">
                <div class="tr-modal-title">
                    <i class="ti ti-plane-arrival"></i>
                    <span>Plan New Trip</span>
                </div>
                <button class="tr-modal-close" onclick="toggleNewTripModal()"><i
                        class="ti ti-x"></i></button>
            </div>

            <div class="tr-modal-body">
                <form id="newTripForm" onsubmit="event.preventDefault()">
                    <div class="tr-input-group full">
                        <label for="trInpTitle">Trip Details / Purpose</label>
                        <input type="text" id="trInpTitle"
                            placeholder="e.g. Business Meeting in Berlin"
                            required>
                    </div>

                    <div class="tr-input-row">
                        <div class="tr-input-group">
                            <label for="trInpCategory">Category</label>
                            <select id="trInpCategory">
                                <option value="Business">Business</option>
                                <option value="Vacation">Vacation</option>
                                <option value="Event">Event</option>
                            </select>
                        </div>
                        <div class="tr-input-group">
                            <label for="trInpDestination">Destination</label>
                            <input type="text" id="trInpDestination"
                                placeholder="e.g. Berlin, Germany" required>
                        </div>
                    </div>

                    <div class="tr-input-row">
                        <div class="tr-input-group">
                            <label for="trInpStartDate">Start Date</label>
                            <input type="date" id="trInpStartDate" required>
                        </div>
                        <div class="tr-input-group">
                            <label for="trInpEndDate">End Date</label>
                            <input type="date" id="trInpEndDate" required>
                        </div>
                    </div>

                    <div class="tr-input-row">
                        <div class="tr-input-group">
                            <label for="trInpVehicle">Vehicle</label>
                            <select id="trInpVehicle">
                                <option value="Plane">Plane</option>
                                <option value="Train">Train</option>
                                <option value="Car">Car</option>
                                <option value="Bus">Bus</option>
                            </select>
                        </div>
                        <div class="tr-input-group">
                            <label for="trInpCost">Est. Cost ($)</label>
                            <input type="number" id="trInpCost"
                                placeholder="0.00">
                        </div>
                    </div>

                    <div class="tr-input-group full">
                        <label for="trInpDescription">Trip Description
                            (Mandatory)</label>
                        <textarea id="trInpDescription"
                            placeholder="Provide detailed info about the trip..."
                            required></textarea>
                    </div>
                </form>
            </div>

            <div class="tr-modal-footer">
                <button class="tr-modal-btn cancel"
                    onclick="toggleNewTripModal()">Cancel</button>
                <button class="tr-modal-btn save" id="trSaveBtn">Create Trip
                    Plan</button>
            </div>
        </div>
    </div>
</div>
