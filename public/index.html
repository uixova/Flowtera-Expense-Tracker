<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Expense Tracker</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/page/home.css">
        <link rel="stylesheet" href="css/modals.css">
        <link rel="stylesheet" href="css/page/expense.css">
        <link rel="stylesheet" href="css/page/trips.css">
        <link rel="stylesheet" href="css/page/analysis.css">
        <link rel="stylesheet" href="css/page/history.css">
        <link rel="stylesheet" href="css/page/team.css">
        <link rel="stylesheet" href="css/page/st.css">
        <link rel="stylesheet" href="css/head.css">
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    </head>
    <body>

        <header>
            <div class="top-head">
                <div class="app-logo">
                    <h1>Flowtera</h1>
                </div>
                <div class="head-project-manager">
                    <div class="head-lnk-btn">
                        <button class="github-source" id="githubLink"><i
                                class="ti ti-brand-github"></i> Source
                            code</button>
                        <button class="donate-lnk" id="donateBtn"><i
                                class="ti ti-heart"></i> Donate</button>
                        <button class="light-dark-head" id="headThemeBtn"><i
                                class="ti ti-sun"></i></button>
                    </div>
                    <div class="head-user-profile" id="headUserProfile"
                        onclick="toggleUserDropdown(event)">
                        <div class="head-profile-img">
                            <img src="images/user-profile.png"
                                id="navAvatarPreview">
                        </div>
                    </div>
                </div>
            </div>
            <hr>
            <div class="bottom-head">
                <div class="left-head">
                    <ul>
                        <li><a href="#home"><i class="ti ti-home"></i>
                                Home</a></li>
                        <li><a href="#expense"><i
                                    class="ti ti-calendar-dollar"></i>
                                Expense</a></li>
                        <li><a href="#trips"><i
                                    class="ti ti-plane-departure"></i>
                                Trips</a></li>
                        <li><a href="#analysis"><i class="ti ti-chart-pie"></i>
                                Analysis</a></li>
                        <li><a href="#history"><i class="ti ti-history"></i>
                                History</a></li>
                        <li><a href="#team"><i class="ti ti-users-group"></i>
                                Team</a></li>
                        <li><a href="#help"><i class="ti ti-help"></i>
                                Help</a></li>
                    </ul>
                </div>
                <div class="right-head">
                    <ul>
                        <li><button class="nav-settings-btn"
                                onclick="window.location.hash = 'settings'">Settings</button></li>
                        <li><button class="nav-theme-btn"
                                onclick="toggleThemePanel(event)">Theme</button></li>
                    </ul>
                </div>
            </div>
        </header>

        <div class="app-container" id="appContainer">

        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="js/main.js"></script>
        <script src="js/st.js"></script>
        <script src="js/modals.js"></script>
    </body>
</html>
